<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>挪威行前待辦</title>
<style>
:root{--bg:#0d1b2a;--surface:#111f30;--card:#142038;--border:#1e3a50;--accent:#5bc8f5;--green:#3dba7e;--orange:#f5a742;--text:#e8edf2;--muted:#7a9ab0}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.6;padding-bottom:40px}
.hero{background:linear-gradient(160deg,#0a2e52 0%,#1a5276 55%,#1a7a5e 100%);color:#fff;padding:1.75rem 1.25rem 1.25rem;text-align:center}
.hero h1{font-size:20px;font-weight:600;margin-bottom:6px}
.hero p{font-size:13px;opacity:.85}
.bar-wrap{max-width:680px;margin:1rem auto 0;padding:0 1rem}
.bar-track{background:#1e3a50;border-radius:99px;height:12px;overflow:hidden}
.bar-fill{background:linear-gradient(90deg,#1a7a5e,#2bb98a);height:100%;width:0;transition:width .3s ease}
.bar-label{font-size:12px;color:var(--muted);text-align:center;margin-top:6px}
.wrap{max-width:680px;margin:0 auto;padding:1rem}
.group{background:var(--card);border-radius:12px;border:1px solid var(--border);margin-bottom:14px;overflow:hidden}
.group h2{font-size:14px;font-weight:700;padding:12px 16px;background:#0f2540;color:var(--text);border-bottom:1px solid var(--border)}
.group.red h2{color:#ef7a72}
.group.yellow h2{color:#f5c87a}
.group.done h2{color:#6dd8a3}
.item{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-top:1px solid rgba(30,58,80,.5);cursor:pointer}
.item:first-of-type{border-top:none}
.item input{appearance:none;-webkit-appearance:none;flex-shrink:0;width:22px;height:22px;border:2px solid #3a5a72;border-radius:6px;margin-top:1px;cursor:pointer;position:relative;transition:.15s}
.item input:checked{background:var(--green);border-color:var(--green)}
.item input:checked::after{content:"✓";position:absolute;color:#0d1b2a;font-size:14px;font-weight:700;left:4px;top:-1px}
.item label{font-size:14px;cursor:pointer;flex:1;color:var(--text)}
.item .note{display:block;font-size:12px;color:var(--muted);margin-top:2px}
.item input:checked + label{color:#5f7a8f;text-decoration:line-through}
.item input:checked + label .note{text-decoration:none}
.reset{display:block;margin:8px auto 0;background:var(--card);border:1px solid var(--border);color:var(--muted);font-size:12px;padding:8px 16px;border-radius:8px;cursor:pointer}
.reset:active{background:var(--surface)}
</style>
</head>
<body>
<div style="background:#1a1a18;padding:10px 16px;text-align:center;font-size:13px;letter-spacing:.3px">
  <a href="index.html" style="color:#aaa;margin:0 8px;text-decoration:none">📋 行程細節</a>
  <a href="hotels.html" style="color:#aaa;margin:0 8px;text-decoration:none">🏨 住宿</a>
  <a href="transport.html" style="color:#aaa;margin:0 8px;text-decoration:none">🚗 交通</a>
  <a href="norway-todo.html" style="color:#aaa;margin:0 8px;text-decoration:none"><strong style="color:#fff">✅ 待辦</strong></a>
</div>

<div class="hero">
  <div style="font-size:24px;margin-bottom:4px">✅</div>
  <h1>挪威行前待辦清單</h1>
  <p>點一下打勾，進度會自動記住（存在這台裝置）</p>
</div>

<div class="bar-wrap">
  <div class="bar-track"><div class="bar-fill" id="barFill"></div></div>
  <div class="bar-label" id="barLabel">0 / 0 完成</div>
  <button class="reset" id="resetBtn">重設全部</button>
</div>

<div class="wrap" id="list">

  <div class="group done">
    <h2>✅ 已完成</h2>
    <div class="item"><input type="checkbox" id="t-flights"><label for="t-flights">訂機票<span class="note">CI73＋KL1199（去）／KL1158＋KL807（回）</span></label></div>
  </div>

  <div class="group red">
    <h2>🔴 現在就訂（量少、會漲、搶手）</h2>
    <div class="item"><input type="checkbox" id="t-car"><label for="t-car">租車 Avis<span class="note">Bergen City 取(9/23)／Ålesund Vigra 還(9/28)；EV＋全險(零自負額)＋第二駕駛；確認跨點還車費、AutoPASS、還車電量政策</span></label></div>
    <div class="item"><input type="checkbox" id="t-hotels"><label for="t-hotels">訂 7 間住宿<span class="note">Clarion The Hub(Oslo)、Fretheim(Flåm)、Thon Rosenkrantz(Bergen×2)、Trolltunga Hotel(Odda×2)、Hotel Alexandra(Loen)、Hotel Union(Geiranger)、Hotel 1904(Ålesund)</span></label></div>
    <div class="item"><input type="checkbox" id="t-nin"><label for="t-nin">Norway in a Nutshell（9/20–21）<span class="note">套票(norwaysbest/fjordtours) 或自己分段(Vy＋Flåm Railway＋Nærøyfjord 遊船)</span></label></div>
    <div class="item"><input type="checkbox" id="t-ferry"><label for="t-ferry">Hellesylt–Geiranger 渡輪（9/26）<span class="note">fjord1.no，早訂＋查當日時刻（季節性、班次少）</span></label></div>
  </div>

  <div class="group yellow">
    <h2>🟡 接著訂</h2>
    <div class="item"><input type="checkbox" id="t-cruise"><label for="t-cruise">Geiranger 峽灣遊船（9/26）<span class="note">geirangerfjord.no</span></label></div>
    <div class="item"><input type="checkbox" id="t-resto"><label for="t-resto">餐廳訂位<span class="note">Ægir(Flåm 9/20)、Bryggeloftet(Bergen 9/21)；注意各店公休日</span></label></div>
    <div class="item"><input type="checkbox" id="t-onsite"><label for="t-onsite">（可現場買）Fløibanen 9/22、Loen Skylift 9/25、Dalsnibba 9/26、Trolltunga P2 停車 9/24</label></div>
  </div>

  <div class="group">
    <h2>📄 證件 / 文件（出發前辦好）</h2>
    <div class="item"><input type="checkbox" id="t-idp"><label for="t-idp">國際駕照 IDP — 兩人都辦<span class="note">監理站</span></label></div>
    <div class="item"><input type="checkbox" id="t-passport"><label for="t-passport">確認護照效期 ≥ 9/29 後 3 個月（建議 6 個月）、含身分證字號</label></div>
    <div class="item"><input type="checkbox" id="t-card"><label for="t-card">主駕名下信用卡（租車押金用）</label></div>
    <div class="item"><input type="checkbox" id="t-insurance"><label for="t-insurance">旅遊保險<span class="note">含行程延誤/轉機失誤＋登山救援</span></label></div>
  </div>

  <div class="group">
    <h2>📱 EV / App 準備（出發前）</h2>
    <div class="item"><input type="checkbox" id="t-chargeapp"><label for="t-chargeapp">裝好並註冊充電 App＋綁付款<span class="note">Fortum Charge & Drive＋Tesla/Mer/Eviny（OTP 要在台灣先弄）</span></label></div>
    <div class="item"><input type="checkbox" id="t-apps"><label for="t-apps">裝 ABRP、Vy、yr.no、Vegvesen Trafikk App</label></div>
    <div class="item"><input type="checkbox" id="t-hotelcharge"><label for="t-hotelcharge">跟各飯店確認有無 EV 充電（過夜充最划算）</label></div>
  </div>

  <div class="group">
    <h2>🧳 打包</h2>
    <div class="item"><input type="checkbox" id="t-gear"><label for="t-gear">登山裝備<span class="note">登山鞋、防水外套、登山杖、2L 水、行動糧、急救包</span></label></div>
    <div class="item"><input type="checkbox" id="t-plug"><label for="t-plug">歐規轉接插頭(Type C/F)、行動電源</label></div>
    <div class="item"><input type="checkbox" id="t-cash"><label for="t-cash">信用卡為主（挪威幾乎全刷卡）</label></div>
  </div>

  <div class="group">
    <h2>⏰ 行前最後確認（出發前 1–2 週）</h2>
    <div class="item"><input type="checkbox" id="t-busstog"><label for="t-busstog">Vy 查 9/20–21 有無 buss for tog（鐵路替代巴士）</label></div>
    <div class="item"><input type="checkbox" id="t-seasonal"><label for="t-seasonal">確認 Hellesylt 渡輪／Dalsnibba 當日營運</label></div>
    <div class="item"><input type="checkbox" id="t-reconfirm"><label for="t-reconfirm">重新確認 4 段班機時刻</label></div>
    <div class="item"><input type="checkbox" id="t-weather"><label for="t-weather">9/24 Trolltunga 前一晚看 yr.no 天氣</label></div>
  </div>

  <div class="group">
    <h2>💻 （選配）網站 / 地圖</h2>
    <div class="item"><input type="checkbox" id="t-github"><label for="t-github">上傳檔案到 GitHub（index.html、行程細節、航班、待辦、CSV）</label></div>
    <div class="item"><input type="checkbox" id="t-mymaps"><label for="t-mymaps">用 CSV 建 Google My Maps</label></div>
  </div>

</div>

<script>
(function(){
  var KEY='norwayTodoV1';
  var boxes=[].slice.call(document.querySelectorAll('.item input[type=checkbox]'));
  function load(){ try { return JSON.parse(localStorage.getItem(KEY)||'null'); } catch(e){ return null; } }
  function save(s){ try { localStorage.setItem(KEY, JSON.stringify(s)); } catch(e){} }
  var state=load();
  if(state===null){ state={'t-flights':true}; save(state); } // 機票預設已完成
  boxes.forEach(function(b){ b.checked=!!state[b.id]; });
  function update(){
    var done=boxes.filter(function(b){return b.checked;}).length;
    var total=boxes.length;
    document.getElementById('barFill').style.width=(total?Math.round(done/total*100):0)+'%';
    document.getElementById('barLabel').textContent=done+' / '+total+' 完成';
  }
  boxes.forEach(function(b){
    b.addEventListener('change',function(){
      state[b.id]=b.checked; save(state); update();
    });
  });
  document.getElementById('resetBtn').addEventListener('click',function(){
    if(!confirm('確定要清除所有勾選嗎？')) return;
    state={}; save(state);
    boxes.forEach(function(b){ b.checked=false; });
    update();
  });
  update();
})();
</script>
</body>
</html>
